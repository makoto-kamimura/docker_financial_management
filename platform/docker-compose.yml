# 決算管理システム ローカル開発用 Docker Compose
# 起動: docker compose -f platform/docker-compose.yml up --build
services:
  web:
    build:
      context: ..
      dockerfile: platform/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/financial
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: financial
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d financial"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
