name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (typecheck & build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    env:
      # ビルド時はDB接続しないためダミーで可
      DATABASE_URL: postgresql://app:app@localhost:5432/financial
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run build
