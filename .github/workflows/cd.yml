name: CD

# 本番デプロイのワークフロー。
# - main へのマージ、または v* タグの push で起動
# - Docker イメージをビルドして GitHub Container Registry (GHCR) に push
# - 本番サーバーへ SSH して docker compose で反映（自動デプロイ）
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/web

jobs:
  build-and-push:
    name: build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/docker/web.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: deploy (SSH + Docker Compose)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # デプロイ対象イメージのタグを決定（タグ push は版数、main は :main）
      - name: Resolve image reference
        id: img
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          else
            TAG="main"
          fi
          echo "ref=ghcr.io/${GITHUB_REPOSITORY}/web:${TAG}" >> "$GITHUB_OUTPUT"

      # 本番用 compose ファイルをサーバーへ配置
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: platform/docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      # SSH してイメージを pull し、コンテナを更新・マイグレーション適用
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          WEB_IMAGE: ${{ steps.img.outputs.ref }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          envs: WEB_IMAGE
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            # GHCR が private の場合のみログイン（public パッケージなら不要）
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            fi
            export WEB_IMAGE
            # 新イメージを取得して起動
            docker compose -f platform/docker-compose.prod.yml pull
            docker compose -f platform/docker-compose.prod.yml up -d
            # DB マイグレーションを適用
            docker compose -f platform/docker-compose.prod.yml run --rm web npx prisma migrate deploy
            # 不要になった古いイメージを掃除
            docker image prune -f

